name: Deploy static content to Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      # Prepare a minimal publish folder so we only upload the files that are needed.
      - name: Prepare publish folder
        run: |
          rm -rf site
          mkdir -p site
          # Copy index and the assets directory (adjust if you have other files)
          cp index.html site/ || true
          cp style.css site/ || true
          cp script.js site/ || true
          if [ -d assets ]; then cp -r assets site/; fi

      - name:  show publish folder contents
        run: |
          echo "Publish folder tree:"
          ls -la site || true
          echo "Recursive listing:"
          find site -maxdepth 3 -type f -print || true

      - uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - id: deployment
        uses: actions/deploy-pages@v5
